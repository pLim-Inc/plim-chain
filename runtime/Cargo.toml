try-runtime = [
	"frame-executive/try-runtime",
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"frame-try-runtime/try-runtime",
	"pallet-aura/try-runtime",
	"pallet-assets/try-runtime",
	"pallet-balances/try-runtime",
	"pallet-nfts/try-runtime",
	"pallet-grandpa/try-runtime",
	"pallet-sudo/try-runtime",
	"pallet-multisig/try-runtime",
	"pallet-timestamp/try-runtime",
	"pallet-plim-identity/try-runtime",
	"pallet-plim-payments/try-runtime",
	"pallet-plim-mandates/try-runtime",
	"pallet-plim-channels/try-runtime",
	"pallet-plim-delegation/try-runtime",
	"pallet-plim-compliance/try-runtime",
	"pallet-plim-reputation/try-runtime",
	"pallet-plim-timestamps/try-runtime",
	"pallet-plim-licenses/try-runtime",
	"pallet-plim-marketplace/try-runtime",
	"pallet-plim-royalties/try-runtime",
	"pallet-plim-oracle/try-runtime",
